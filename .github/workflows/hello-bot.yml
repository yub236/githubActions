name: Hello Bot

on:
  issue_comment:
    types: [created]

env:
  GREETING: "こんにちは"

jobs:
  validate_comment:
    runs-on: ubuntu-latest
    if:  github.event.comment.body == 'hello'         # FIXME①: 'hello' と完全一致するコメントのみ実行されるようにする
    steps:
      - name: コメント内容を確認
        run: |
          echo "コメント本文: ${{ github.event.comment.body }}"
          echo "実行ユーザー: ${{ github.actor }}"        # FIXME②: 実行ユーザー名を echo で出力する

  reply:
    runs-on: ubuntu-latest
    needs: validate_comment        # FIXME③: validate_comment の完了後に実行されるようにする
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: PR にコメントを返信する
        uses: actions/github-script@v8
        env:
          ACTOR: ${{ github.actor }}
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,              // FIXME④: PR/issue 番号を参照する
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${process.env.GREETING}, @${process.env.ACTOR} さん！`
            });
